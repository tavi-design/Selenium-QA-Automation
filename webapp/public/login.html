<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login – Task Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h1>Task Manager</h1>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" />
      </div>
      <p id="login-error" class="error-msg"></p>
      <button id="login-btn" class="btn btn-primary" style="width:100%" type="submit">Sign In</button>
    </form>
    <p class="login-hint">
      Demo accounts:<br/>
      <strong>admin</strong> / admin123 &nbsp;|&nbsp; <strong>testuser</strong> / user123
    </p>
  </div>
</div>
<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = document.getElementById("login-error");
    err.textContent = "";
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) { err.textContent = "Username and password are required."; return; }
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    if (res.ok) {
      window.location.href = "/dashboard.html";
    } else {
      const data = await res.json();
      err.textContent = data.error || "Login failed.";
    }
  });
</script>
</body>
</html>
