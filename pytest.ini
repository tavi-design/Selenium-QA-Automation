[pytest]
testpaths = tests
addopts = --html=reports/report.html --self-contained-html -v
markers =
    smoke:      Fast sanity checks — run on every commit
    regression: Full regression suite — run on PRs
    e2e:        End-to-end user journey tests
    api:        API-layer tests (no browser)
    negative:   Negative / error-path tests
